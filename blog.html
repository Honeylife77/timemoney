        :root {

            --card-bg: #ffffff;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            display: flex;
        }

        /* 좌측 메뉴 */
        .sidebar {
            width: 200px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            gap: 20px;
            z-index: 100;
        }

        .sidebar a, .sidebar button {
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 15px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .sidebar a:hover, .sidebar button:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* 메인 콘텐츠 */
        .main-container {
            margin-left: 200px;
            flex: 1;
            padding: 60px 40px;
            max-width: 900px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .blog-header h1 {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        /* 목차 영역 */
        .toc-section {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 60px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .toc-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        .toc-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            list-style: none;
        }

        .toc-list a {
            text-decoration: none;
            color: #4b5563;
            font-size: 14px;
            transition: 0.2s;
        }

        .toc-list a:hover {
            color: var(--accent);
        }

        /* 게시글 영역 */
        .article-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            scroll-margin-top: 40px;
        }

        .article-card h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--text);
        }

        .article-card p {
            margin-bottom: 15px;
            color: #374151;
            word-break: keep-all;
        }

        /* 하단 버튼 */
        .bottom-nav {
            text-align: center;
            margin-top: 60px;
            padding-bottom: 100px;
        }

        .top-btn {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: var(--text);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 15px;
            }
            .main-container {
                margin-left: 0;
                padding: 30px 15px;
            }
        }
    </style>
</head>

                const tocItem = document.createElement('a');
                tocItem.href = `#article${num}`;
                tocItem.textContent = `${num}. ${title}`;
                tocContainer.appendChild(tocItem);

                // 아티클 추가
                const articleCard = document.createElement('article');
                articleCard.className = 'article-card';
                articleCard.id = `article${num}`;
                articleCard.innerHTML = `
                    <h2>${num}. ${title}</h2>
                    <p>${content}</p>
                    <p>시간은 흐르는 것이 아니라 채워지는 것입니다. 당신의 오늘을 가치 있는 생각과 행동으로 가득 채워보세요. <strong>시간은돈(TimeMoney)</strong>이 당신의 여정을 응원합니다.</p>
                `;
                articlesContainer.appendChild(articleCard);
            });
        }

        function scrollToToc() {
            document.getElementById('table-of-contents').scrollIntoView({ behavior: 'smooth' });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = initBlog;
    </script>
</body>
</html>
